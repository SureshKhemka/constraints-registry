name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in the sections below.
        For **security vulnerabilities**, do not file a public issue — see
        [SECURITY.md](https://github.com/SureshKhemka/constraints-registry/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) and any config/constraint needed to reproduce.
      placeholder: |
        1. `uv run cregistry-harness ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output / logs
      description: Paste the harness or MCP JSON output, stack trace, or error message.
      render: shell
  - type: input
    id: component
    attributes:
      label: Component
      description: Which part? (e.g. checkov adapter, sarif normalizer, MCP server, harness)
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, uv version, and any relevant engine versions.
      placeholder: |
        - OS: macOS 15
        - Python: 3.11.x
        - uv: x.y.z
        - opa / conftest / checkov / semgrep versions:
    validations:
      required: true
